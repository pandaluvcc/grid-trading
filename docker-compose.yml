# docker-compose.yml - Platform 平台服务编排
# 位置: /data/docker/platform/docker-compose.yml
#
# 目录结构：
# /data/docker/
# ├── mysql/                      # MySQL
# ├── openresty/                  # OpenResty
# └── platform/
#     ├── docker-compose.yml      # 本文件
#     └── grid-trading/           # Grid Trading 项目
#         ├── app.jar
#         ├── lib/
#         ├── Dockerfile
#         └── deploy.sh

version: '3.8'

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ww2233ee
      MYSQL_DATABASE: grid_trading
      MYSQL_USER: grid_user
      MYSQL_PASSWORD: ww2233ee
      TZ: Asia/Shanghai
    volumes:
      - /data/docker/mysql/data:/var/lib/mysql
      - /data/docker/platform/grid-trading/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # ==================== Grid Trading 后端 ====================
  backend:
    build:
      context: /data/docker/platform/grid-trading
      dockerfile: Dockerfile
    container_name: grid-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_PASSWORD=ww2233ee
      - TZ=Asia/Shanghai
    volumes:
      - /data/docker/platform/grid-trading/config:/app/config:ro
      - /data/docker/platform/grid-trading/logs:/app/logs
    networks:
      - platform-network

  # ==================== 前端 + 反向代理 ====================
  openresty:
    image: openresty/openresty:alpine
    container_name: openresty
    restart: always
    ports:
      - "80:80"
    volumes:
      - /data/docker/openresty/nginx/content/grid-trading:/usr/share/nginx/html:ro
      - /data/docker/openresty/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge
