# docker-compose.yml - Grid Trading 生产环境部署
# 全部服务 Docker 化：MySQL + 后端 + OpenResty（前端）
version: '3.8'

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: grid-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Root@2026!
      MYSQL_DATABASE: grid_trading
      MYSQL_USER: grid_user
      MYSQL_PASSWORD: GridTrading@2026
      TZ: Asia/Shanghai
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grid-network

  # ==================== 后端服务 ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grid-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_PASSWORD=GridTrading@2026
      - TZ=Asia/Shanghai
    networks:
      - grid-network

  # ==================== 前端 + 反向代理 ====================
  openresty:
    image: openresty/openresty:alpine
    container_name: grid-openresty
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - grid-network

networks:
  grid-network:
    driver: bridge


